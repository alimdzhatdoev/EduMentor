services:
  - type: web
    name: edumentor
    runtime: node
    buildCommand: npm install --prefix client && npm run build --prefix client && npm install --prefix server && npm run build --prefix server
    startCommand: cd server && npx prisma db push && node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: edumentor-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: edumentor-db
    plan: free
